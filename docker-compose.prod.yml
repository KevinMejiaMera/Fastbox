services:
  postgres:
    image: postgres:15
    container_name: fastbox_postgres_prod
    ports:
      - "5432:5432"
    env_file:
      - .env.prod
    volumes:
      - postgres-data-prod:/var/lib/postgresql/data
    networks:
      - fastbox-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: fastbox_redis_prod
    networks:
      - fastbox-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  backend:
    build: ./backend
    container_name: fastbox_backend_prod
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "🔄 Waiting for PostgreSQL..."
        until python -c 'import socket; socket.create_connection(("postgres", 5432), timeout=1)' 2>/dev/null; do
          sleep 1
        done
        echo "✅ PostgreSQL is ready!"
        echo "🔄 Running migrations..."
        python manage.py makemigrations
        python manage.py migrate --noinput
        echo "🔄 Collecting static files..."
        python manage.py collectstatic --noinput
        echo "🚀 Starting Django Server for Production..."
        python manage.py runserver 0.0.0.0:8000
    volumes:
      # No montamos código fuente local en producción, usamos lo que copió el Dockerfile
      - backend-static-prod:/app/staticfiles
      - backend-media-prod:/app/media
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fastbox-network
    restart: always

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - REACT_APP_API_BASE_URL=https://fre.fronteratech.ec
        - REACT_APP_AUTH_SERVICE=https://fre.fronteratech.ec
        - REACT_APP_FAST_FOOD_SERVICE=https://fre.fronteratech.ec
    container_name: fastbox_frontend_prod
    networks:
      - fastbox-network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: fastbox_nginx_prod
    ports:
      - "8080:80"
    volumes:
      - ./nginx-prod.conf:/etc/nginx/nginx.conf:ro
      - backend-static-prod:/usr/share/nginx/html/static/backend:ro
      - backend-media-prod:/usr/share/nginx/html/media:ro
    depends_on:
      - backend
      - frontend
    networks:
      - fastbox-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  fastbox-network:
    driver: bridge
    name: fastbox_network_prod

volumes:
  postgres-data-prod:
    name: fastbox_postgres_data_prod
  backend-static-prod:
    name: fastbox_backend_static_prod
  backend-media-prod:
    name: fastbox_backend_media_prod
